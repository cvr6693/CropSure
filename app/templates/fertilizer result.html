<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            background-image: url("{{ url_for('static', filename='images/fertilizer image.jpg') }}"); 
            background-size: cover;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }

        .btn:hover {
            background-color: #45a049;
        }
        .result-box {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            background: #f4f4f4;
            
        }
    </style>
</head>
<body>
    <h1>Fertilizer Recommendation</h1>
    <div class="result-box">
        {% if recommendation %}
            <p>{{ recommendation | safe }}</p>
        {% else %}
            <p>No recommendation found.</p>
        {% endif %}
        <a href="{{ url_for('fertilizer_recommendation') }}" class="btn">Go Back</a>
        <a href="{{ url_for('home') }}" class="btn">Go Home</a>
    </div>
</body>
</html>
