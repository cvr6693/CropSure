<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation</title>
    <style>
        body {
            background-image: url("{{ url_for('static', filename='images/indeximage.jpg') }}"); 
            background-size: cover;
            background-repeat: no-repeat;
            padding: 50px;
            font-size: 20px;
            font-family: Arial, sans-serif;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            filter: blur(4px);
            z-index: -1;
        }

        h1 {
            color: rgb(25, 16, 16);
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: large;
        }

        label {
            width: 200px;
            font-weight: bold;
        }

        input, select {
            width: 250px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: large;
        }
        select {
    width: 270px; /* Increase width */
    height: 25px; /* Increase height */
    padding: 1px; /* Add padding for better appearance */
    font-size: 20px; /* Increase text size */
    border: 1px solid #efebeb;
    border-radius: 5px;
    opacity: 0.92;
    color: black;
    background-color: white;
}
    </style>
   <script>
    function validateInputs() {
        let nitrogen = document.getElementById("nitrogen").value;
        let phosphorus = document.getElementById("phosphorus").value;
        let potassium = document.getElementById("potassium").value;
        let rainfall = document.getElementById("rainfall").value;
        let ph = document.getElementById("ph").value;
    
        let errors = [];
    
        // Validate Nitrogen
        if (!(nitrogen <=150 && nitrogen > 0)) {
            errors.push("Nitrogen value must be between 0 and 150.");
        }
    
        // Validate Phosphorus
        if (!(phosphorus < 150 && phosphorus > 0)){
            errors.push("Phosphorus value must be between 0 and 150.");
        }
    
        // Validate Potassium
        if (!(potassium < 210 && potassium > 0)){
            errors.push("Potassium value must be between 0 and 210.");
        }
    
        // Validate Rainfall (Example range: 50-500)
        if (!(rainfall < 300 && rainfall > 10) ){
            errors.push("Rainfall value must be between 10 and 300 mm.");
        }
        if (!(ph < 9.5 && ph > 4) ){
            errors.push("ph value must be between 4 and 9.5.");
        }
    
        // If there are errors, show an alert
        if (errors.length > 0) {
            alert(errors.join("\n")); // Display all errors
            return false; // Prevent form submission
        }
        window.location.href = "{{ url_for('crop_predict') }}";
        return true; // Proceed if no errors
    }
    </script>
    
</head>
<body>
    <h1>Add Values for Crop Recommendation</h1>
    <br><br>
    <form action="{{ url_for('crop_predict') }}" method="POST" onsubmit="return validateInputs();">
        <div class="form-group">
            <label for="nitrogen">Nitrogen (N):</label>
            <input type="number" id="nitrogen" name="nitrogen" required>
        </div>

        <div class="form-group">
            <label for="phosphorus">Phosphorus (P):</label>
            <input type="number" id="phosphorus" name="phosphorus" required>
        </div>

        <div class="form-group">
            <label for="potassium">Potassium (K):</label>
            <input type="number" id="potassium" name="potassium" required>
        </div>

        <div class="form-group">
            <label for="rainfall">Rainfall (mm):</label>
            <input type="number" id="rainfall" name="rainfall" required>
        </div>

        <div class="form-group">
            <label for="ph">pH:</label>
            <input type="number" id="ph" name="ph" required>
        </div>

        <!-- ✅ State and City Dropdowns -->
        <div class="form-group">
            <label for="State"><b>State</b></label>
            <select onchange="print_city('state', this.selectedIndex);" 
                id="sts" name="state" required>
            </select>
        </div>

        <div class="form-group">
            <label for="City"><b>City</b></label>
            <select id="state" name="city" required></select>
        </div>

        <!-- ✅ Submit Button -->
        <button type="submit" style="display: block; margin: 20px auto; padding: 10px 20px; font-size: 18px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Submit
        </button>
    </form>

    <!-- ✅ Load JavaScript for Cities -->
    <script src="{{ url_for('static', filename='js/cities.js') }}"></script>
    <script>
        print_state("sts");  // Load states when the page loads
    </script>
