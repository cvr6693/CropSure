<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation Result</title>
    <style>
        body {
            background-image: url("{{ url_for('static', filename='images/indeximage.jpg') }}"); 
            background-size: cover;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 50px;
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: auto;
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 20px;
            color: #555;
        }

        .result {
            font-size: 24px;
            font-weight: bold;
            color: #008000;
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Crop Recommendation Result</h1>
        
        {% if prediction %}
            <p>The best crop to grow based on your input is:</p>
            <div class="result">{{ prediction }}</div>
        {% else %}
            <p>Sorry, we could not process your request. Please try again.</p>
        {% endif %}
        
        <a href="{{ url_for('crop_recommend') }}" class="btn">Try Again</a>
        <a href="{{ url_for('home') }}" class="btn">Go Home</a>
    </div>

</body>
</html>
