<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation</title>
    <style>
        body {
            background-image: url("{{ url_for('static', filename='images/indeximage.jpg') }}"); 
            background-size: cover;
            background-repeat: no-repeat;
            padding: 50px;
            font-size: 20px;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: rgb(25, 16, 16);
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: large;
        }

        label {
            width: 200px;
            font-weight: bold;
        }

        input, select {
            width: 270px;
            padding: 3px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: large;
        }
        

        select {
            width: 270px;
            height: 25px;
            padding: 1px;
            font-size: 20px;
            border: 1px solid #efebeb;
            border-radius: 5px;
            opacity: 0.92;
            color: black;
            background-color: white;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #534caf;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
    
</head>
<body>
    <h1>Add Values for Crop Recommendation</h1>
    <br><br> 
    <form action="{{ url_for('crop_prediction') }}" method="POST" onsubmit="return validateInputs();">

        <div class="form-group">
            <label for="nitrogen">Nitrogen (N):</label>
            <input type="number" id="nitrogen" name="nitrogen" placeholder="Enter value from 0 to 150" min="0" max="150" step="0.1" required>
        </div>

        <div class="form-group">
            <label for="phosphorous">Phosphorus (P):</label>
            <input type="number" id="phosphorous" name="phosphorous" placeholder="Enter value from 0 to 150" min="0" max="150" step="0.1" required>
        </div>

        <div class="form-group">
            <label for="pottasium">Potassium (K):</label>
            <input type="number" id="pottasium" name="pottasium" placeholder="Enter value from 0 to 210" min="0" max="210" step="0.1" required>
        </div>

        <div class="form-group">
            <label for="rainfall">Rainfall (mm):</label>
            <input type="number" id="rainfall" name="rainfall" placeholder="Enter value from 10 to 300" min="10" max="300" step="0.1" required>
        </div>

        <div class="form-group">
            <label for="ph">pH:</label>
            <input type="number" id="ph" name="ph" placeholder="Enter value from 4 to 9.5" min="4" max="9.5" step="0.1" required>
        </div>

        <div class="form-group"> 
            <label for="State"><b>State</b></label>
            <select onchange="print_city('state', this.selectedIndex);" id="sts" name="state" required></select>
        </div>

        <div class="form-group">
            <label for="City"><b>City</b></label>
            <select id="state" name="city" required></select>
        </div>

        <script src="{{ url_for('static', filename='js/cities.js') }}"></script>
        <script> print_state("sts"); </script>

        <button type="submit" style="display: block; margin: 20px auto; padding: 10px 20px; font-size: 18px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Submit
        </button>
        <a href="{{ url_for('home') }}" class="btn">Go Home</a>
        <a href="{{ url_for('next_page') }}" class="btn">Go to Menu</a>
    </form>
</body>
</html>
