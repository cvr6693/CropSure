<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fertilizer Suggestion</title>
    <style>
        body {
            background-image: url("{{ url_for('static', filename='images/fertilizer image.jpg') }}"); 
            background-size: cover;
            background-repeat: no-repeat;
            padding: 50px;
            font-size: 20px;
            font-family: Arial, sans-serif;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            filter: blur(5px);
            z-index: -1;
        }

        h1 {
            color: rgb(25, 16, 16);
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        label {
            width: 200px;
            font-weight: bold;
        }

        input, select {
            width: 270px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: large;
        }
        select {
    width: 280px; /* Increase width */
    height: 40px; /* Increase height */
    padding: 1px; /* Add padding for better appearance */
    font-size: large; /* Increase text size */
    border: 1px solid #efebeb;
    border-radius: 5px;
    opacity: 0.92;
}
    </style>
    <script>
      function validateInputs() {
          let nitrogen = document.getElementById("nitrogen").value;
          let phosphorus = document.getElementById("phosphorus").value;
          let potassium = document.getElementById("potassium").value;
          
      
          let errors = [];
      
          // Validate Nitrogen
          if (!(nitrogen <=150 && nitrogen > 0)) {
              errors.push("Nitrogen value must be between 0 and 150.");
          }
      
          // Validate Phosphorus
          if (!(phosphorus < 150 && phosphorus > 0)){
              errors.push("Phosphorus value must be between 0 and 150.");
          }
      
          if (!(potassium < 210 && potassium > 0)){
              errors.push("Potassium value must be between 0 and 210.");
          }
          if (errors.length > 0) {
              alert(errors.join("\n")); // Display all errors
              return false; // Prevent form submission
          }
          window.location.href = "{{ url_for('fert_recommend') }}";
      
          return true; // Proceed if no errors
      }
      </script>
</head>
<body>
    <h1>Add Values for Fertilizer Suggestion</h1>
    <br><br>

    <div class="form-group">
        <label for="nitrogen">Nitrogen (N):</label>
        <input type="number" id="nitrogen" name="nitrogen" placeholder= "Enter value between 0 to 150 " min="0" max="150" step="0.1" >
    </div>

    <div class="form-group">
        <label for="phosphorus">Phosphorus (P):</label>
        <input type="number" id="phosphorus" name="phosphorus" placeholder="Enter value between 0 to 150" min="0" max="150" step="0.1">
    </div>

    <div class="form-group">
        <label for="potassium">Potassium (K):</label>
        <input type="number" id="potassium" name="potassium" placeholder="Enter value between 0 to 210" min="0" max="210" step="0.1">
    </div>


    <div class="form-group" style="margin-left: -6px;">
      <label for="crop">Select Crop:</label>
      <select id="crop" name="crop">
          <option value="">Select Crop</option>
          <option value="Apple">Apple</option>
          <option value="Banana">Banana</option>
          <option value="Blackgram">Blackgram</option>
          <option value="Chickpea">Chickpea</option>
          <option value="Coconut">Coconut</option>
          <option value="Coffee">Coffee</option>
          <option value="Cotton">Cotton</option>
          <option value="Grapes">Grapes</option>
          <option value="Jute">Jute</option>
          <option value="Kidneybeans">Kidneybeans</option>
          <option value="Lentil">Lentil</option>
          <option value="Maize">Maize</option>
          <option value="Mango">Mango</option>
          <option value="Mothbeans">Mothbeans</option>
          <option value="Mungbean">Mungbean</option>
          <option value="Muskmelon">Muskmelon</option>
          <option value="Orange">Orange</option>
          <option value="Papaya">Papaya</option>
          <option value="Pigeonpeas">Pigeonpeas</option>
          <option value="Pomegranate">Pomegranate</option>
          <option value="Rice">Rice</option>
          <option value="Watermelon">Watermelon</option>
      </select>
      
    </div>
    <button onclick="return validateInputs()" style="display: block; margin: 20px auto; padding: 10px 20px; font-size: 18px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">
      Submit
  </button>
</body>
</html>
