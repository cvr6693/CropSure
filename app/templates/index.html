<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
    
    body{
        background-image: url("{{ url_for('static', filename='images/crop reccomen.jpeg') }}"); 
        background-size: 1500px,1500px;
        background-repeat: no-repeat;
        font-size: 50px;

    }
    h1{
        position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
            font-weight: bolder;
            text-align: center;
            color: rgb(33, 30, 30);
        
    }
    .btn{
        position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #5e5ccd;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 30px;

    }
    p{
        text-align: center;
        position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 25px;
            font-style: italic;
            font-weight: bold;
        

    }
    body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            filter: blur(2px);
            z-index: -1;
        }
    
   </style>
</head>
<body>
    <h1 style="font-size: larger;">Welcome to Cropsure</h1>
    <p>We Ensure your Crop with AI driven insights</p>
    <a href="{{ url_for('next_page') }}" class="btn">Go to Next Page </a>
    
</body>
</html>
